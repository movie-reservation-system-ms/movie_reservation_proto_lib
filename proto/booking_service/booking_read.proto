syntax = "proto3";

package booking_service.read;

option go_package = "github.com/movie-reservation-system-ms/movie_reservation_proto_lib/booking_service/read;booking_read";

import "booking_service/booking_status.proto";

/*
|--------------------------------------------------------------------------
| Booking Read Service
|--------------------------------------------------------------------------
|
| Read-only APIs for booking system.
|
| Responsibilities:
| - Fetch booking details
| - Fetch user bookings
| - Fetch booking status
| - Fetch booking history
|
| Authentication:
| - Internal JWT via gRPC metadata
| - Added by API Gateway
|
| Example Metadata:
|
| x-signature: token(string) [user-id+role+timestamp+key]
| x-user-id: user-id(string) [UUID v7]
| x-user-role: enum{user,admin,service,...} (string[])
| x-timestamp: timestamp(string)
|
|--------------------------------------------------------------------------
| REST Reference
|--------------------------------------------------------------------------
|
| GET /booking/{id}
| GET /booking/
|
|--------------------------------------------------------------------------
*/

service BookingReadService {

  /*
  |--------------------------------------------------------------------------
  | Get Booking By ID
  |--------------------------------------------------------------------------
  |
  | Fetch a single booking using booking ID.
  |
  | REST:
  | GET /booking/{id}
  |
  */
  rpc GetBookingById(GetBookingByIdRequest) returns (GetBookingByIdResponse);

  /*
  |--------------------------------------------------------------------------
  | Get User Bookings
  |--------------------------------------------------------------------------
  |
  | Fetch all bookings for authenticated user.
  |
  | REST:
  | GET /booking/
  |
  */
  rpc GetBookings(GetBookingsRequest) returns (GetBookingsResponse);
}
/*
|--------------------------------------------------------------------------
| Booking Entity
|--------------------------------------------------------------------------
*/
message Booking {

  // Unique booking identifier
  string booking_id = 1;

  // User identifier
  string user_id = 2;

  // Movie identifier
  string movie_id = 3;

  // Theatre identifier
  string theatre_id = 4;

  // Show schedule identifier
  string schedule_id = 5;

  // Reserved seats
  repeated string seat_ids = 6;

  // Total ticket count
  uint32 ticket_count = 7;

  // Total booking amount
  double total_amount = 8;

  // Current booking status
  booking_service.status.BookingStatus status = 9;

  // Booking creation timestamp
  int64 created_at = 10;

  // Last update timestamp
  int64 updated_at = 11;
}

/*
|--------------------------------------------------------------------------
| Get Bookings
|--------------------------------------------------------------------------
*/

// Request for fetching all bookings
message GetBookingsRequest {

  // User identifier
  //
  // Usually injected internally from auth context.
  optional string user_id = 1;

  // Pagination limit
  uint32 limit = 2;

  // Pagination offset
  uint32 offset = 3;
}

// Response containing booking list
message GetBookingsResponse {

  // List of bookings
  repeated Booking bookings = 1;

  // Total available records
  uint64 total = 2;
}

/*
|--------------------------------------------------------------------------
| Get Booking By ID
|--------------------------------------------------------------------------
*/

// Request for fetching single booking
message GetBookingByIdRequest {

  // Booking identifier
  string booking_id = 1;

  // User identifier
  //
  // Usually injected internally from auth context.
  optional string user_id = 2;
}

// Response containing booking details
message GetBookingByIdResponse {

  // Booking entity
  Booking booking = 1;
}
