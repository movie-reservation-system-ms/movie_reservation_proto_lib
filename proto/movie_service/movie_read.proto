syntax = "proto3";

package movie_service.read;

option go_package = "github.com/movie-reservation-system-ms/movie_reservation_proto_lib/movie_service/read;movie_read";

import "google/protobuf/timestamp.proto";
import "movie_service/movie_status.proto";

/*
|--------------------------------------------------------------------------
| Movie Read Service
|--------------------------------------------------------------------------
|
| Read-only APIs for movie management system.
|
| Responsibilities:
| - Fetch movies
| - Fetch movie details
| - Fetch movie shows
|
| Authentication:
| - Internal gateway authentication via gRPC metadata
| - Added by API Gateway
|
|--------------------------------------------------------------------------
| REST Reference
|--------------------------------------------------------------------------
|
| GET /movies
| GET /movies/{id}
| GET /movies/{id}/shows
|
|--------------------------------------------------------------------------
*/

service MovieReadService {

  /*
  |--------------------------------------------------------------------------
  | Get Movies
  |--------------------------------------------------------------------------
  |
  | Fetch all available movies.
  |
  | REST:
  | GET /movies
  |
  */
  rpc GetMovies(GetMoviesRequest) returns (GetMoviesResponse);

  /*
  |--------------------------------------------------------------------------
  | Get Movie By ID
  |--------------------------------------------------------------------------
  |
  | Fetch single movie details.
  |
  | REST:
  | GET /movies/{id}
  |
  */
  rpc GetMovieById(GetMovieByIdRequest) returns (GetMovieByIdResponse);

  /*
  |--------------------------------------------------------------------------
  | Get Movie Shows
  |--------------------------------------------------------------------------
  |
  | Fetch all schedules/shows for movie.
  |
  | REST:
  | GET /movies/{id}/shows
  |
  */
  rpc GetMovieShows(GetMovieShowsRequest) returns (GetMovieShowsResponse);
}

/*
|--------------------------------------------------------------------------
| Movie Entity
|--------------------------------------------------------------------------
*/
message Movie {

  // Unique movie identifier
  string movie_id = 1;

  // Movie title
  string title = 2;

  // Movie description
  string description = 3;

  // Movie language
  string language = 4;

  // Movie genre
  repeated string genres = 5;

  // Movie duration in minutes
  uint32 duration_minutes = 6;

  // Release date timestamp
  google.protobuf.Timestamp release_date = 7;

  // Poster image URL
  string poster_url = 8;

  // Banner image URL
  string banner_url = 9;

  // Age rating
  string age_rating = 10;

  // Current movie status
  movie_service.status.MovieStatus status = 11;

  // Record creation timestamp
  google.protobuf.Timestamp created_at = 12;

  // Record update timestamp
  google.protobuf.Timestamp updated_at = 13;
}

/*
|--------------------------------------------------------------------------
| Show Entity
|--------------------------------------------------------------------------
*/
message MovieShow {

  // Show identifier
  string show_id = 1;

  // Movie identifier
  string movie_id = 2;

  // Theatre identifier
  string theatre_id = 3;

  // Screen identifier
  string screen_id = 4;

  // Show start time
  google.protobuf.Timestamp start_time = 5;

  // Show end time
  google.protobuf.Timestamp end_time = 6;

  // Ticket price
  double price = 7;

  // Available seats
  uint32 available_seats = 8;
}

/*
|--------------------------------------------------------------------------
| Get Movies
|--------------------------------------------------------------------------
*/

message GetMoviesRequest {

  // Pagination limit
  uint32 limit = 1;

  // Pagination offset
  uint32 offset = 2;

  // Search keyword
  optional string search = 3;

  // Filter by language
  optional string language = 4;

  // Filter by genre
  optional string genre = 5;
}

message GetMoviesResponse {

  // Movie list
  repeated Movie movies = 1;

  // Total records
  uint64 total = 2;

  // Pagination limit
  uint32 limit = 3;

  // Pagination offset
  uint32 offset = 4;
}

/*
|--------------------------------------------------------------------------
| Get Movie By ID
|--------------------------------------------------------------------------
*/

message GetMovieByIdRequest {

  // Movie identifier
  string movie_id = 1;
}

message GetMovieByIdResponse {

  // Movie entity
  Movie movie = 1;
}

/*
|--------------------------------------------------------------------------
| Get Movie Shows
|--------------------------------------------------------------------------
*/

message GetMovieShowsRequest {

  // Movie identifier
  string movie_id = 1;
}

message GetMovieShowsResponse {

  // Movie shows
  repeated MovieShow shows = 1;
}
