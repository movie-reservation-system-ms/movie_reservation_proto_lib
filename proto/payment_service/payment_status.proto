syntax = "proto3";

package payment_service.status;

option go_package = "github.com/movie-reservation-system-ms/movie_reservation_proto_lib/payment_service/;payment_status";

/*
|--------------------------------------------------------------------------
| Payment Status
|--------------------------------------------------------------------------
*/
enum PaymentStatus {
  PAYMENT_STATUS_UNSPECIFIED = 0;
  PAYMENT_STATUS_PENDING = 1;
  PAYMENT_STATUS_PROCESSING = 2;
  PAYMENT_STATUS_SUCCESS = 3;
  PAYMENT_STATUS_FAILED = 4;
  PAYMENT_STATUS_REFUNDED = 5;
}
